<!DOCTYPE html>
<html>
<head>
  <title>Google Sheet Reverse List with Auto-Refresh</title>
</head>
<body>
  <h2>Latest Entries</h2>
  <ul id="sheetList"></ul>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1k7525l8MQdC4O5Uwz4JaO9-X7uORhowgc_pDv3oOeHQ/pub?output=csv";
    const refreshInterval = 10000; // 10 seconds

    function loadSheet() {
      fetch(sheetUrl)
        .then(response => response.text())
        .then(csv => {
          const rows = csv
            .trim()
            .split("\n")
            .map(r => r.split(","))
            .reverse(); // newest first

          const list = document.getElementById("sheetList");
          list.innerHTML = ""; // clear old entries

          rows.forEach(row => {
            const li = document.createElement("li");
            li.textContent = row.join(" — ");
            list.appendChild(li);
          });
        })
        .catch(err => console.error("Error loading sheet:", err));
    }

    // Load immediately
    loadSheet();

    // Auto-refresh
    setInterval(loadSheet, refreshInterval);
  </script>
</body>
</html>
